<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MH Wilds 弓スキル予測ラボ</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>MH Wilds 弓スキル予測ラボ</h1>
  </header>

  <main id="app">
    <section class="form-section">
      <h2>スキル予測フォーム</h2>
      <input list="skillList" id="skillInput" placeholder="スキル名を入力してください">
      <datalist id="skillList">
        <option value="溜め段階解放">
        <option value="弾導強化">
        <option value="スタミナ急速回復">
        <option value="体術">
        <option value="集中">
        <option value="弓溜め段階解放">
      </datalist>
      <button id="predictBtn">予測する</button>
      <div id="result"></div>
    </section>
  </main>

  <footer>
    <small>© 2026 MH Wilds Bow Skill Predictor</small>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
